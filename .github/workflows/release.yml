name: Release

# Builds installers for macOS, Windows, and Linux natively (one runner per OS)
# and attaches them to a GitHub Release.
#
# Two ways to run:
#   * Push a version tag  -> always a PROD (signed + notarized) build that
#     publishes a draft Release:   git tag v1.0.1 && git push origin v1.0.1
#   * Run manually (Actions tab, "Run workflow") -> choose the channel:
#       - dev  (default): UNSIGNED build. Needs NO certificates, so it works
#         today before the Apple/Windows signing identities exist. macOS
#         notarization is forced off so the leg cannot fail hunting for creds.
#       - prod: signed + notarized exactly like a tag push (no-ops to unsigned
#         until the signing secrets are provisioned).
#     Tick "publish_release" to also cut a draft (pre)Release from the run;
#     otherwise the installers are available as workflow artifacts only.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel (dev = unsigned, prod = signed + notarized)'
        type: choice
        options: [dev, prod]
        default: dev
      publish_release:
        description: 'Create a draft GitHub Release from this run'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolves the effective build mode once so every downstream job agrees:
  #   * tag push          -> channel=prod, publish=true
  #   * manual dispatch   -> use the chosen inputs (default dev / no publish)
  # `signed` gates code signing + notarization; `tag` names the Release.
  mode:
    name: Resolve build mode
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
      signed: ${{ steps.resolve.outputs.signed }}
      publish: ${{ steps.resolve.outputs.publish }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve channel / signing / publish
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            channel=prod
            publish=true
            tag="${GITHUB_REF_NAME}"
          else
            channel="${{ github.event.inputs.channel }}"
            publish="${{ github.event.inputs.publish_release }}"
            tag="v${version}-dev.${{ github.run_number }}"
          fi
          channel="${channel:-dev}"
          publish="${publish:-false}"
          if [[ "$channel" == "prod" ]]; then signed=true; else signed=false; fi
          {
            echo "channel=$channel"
            echo "signed=$signed"
            echo "publish=$publish"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved -> channel=$channel signed=$signed publish=$publish tag=$tag"

  build:
    name: Build ${{ matrix.platform }} (${{ needs.mode.outputs.channel }})
    needs: mode
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # Cache the Electron runtime download (pnpm postinstall) and the
      # electron-builder cache (its own bundled Electron + tools). This is the
      # single biggest release-time win: without it every run re-downloads
      # ~100MB of Electron per platform. Keyed on the lockfile so a dependency
      # bump (incl. an Electron version change) busts the cache automatically.
      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-${{ runner.os }}-

      # install runs the postinstall `electron-builder install-app-deps`, which
      # rebuilds native modules (better-sqlite3-multiple-ciphers) for THIS
      # runner's OS/arch.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build app (renderer + main + packages)
        run: pnpm build

      # We skip `prepackage` (the Ollama fetch) on purpose: no verified binary
      # SHAs are pinned yet, and the app falls back to a user-installed Ollama.
      #
      # SIGNED builds (channel=prod / tag push) sign + notarize when the
      # secrets are present and otherwise produce an unsigned artifact (the
      # creds simply no-op until provisioned):
      #   * macOS  - CSC_LINK/CSC_KEY_PASSWORD (Developer ID Application .p12,
      #     base64) sign the .app; APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
      #     APPLE_TEAM_ID notarize it (notarize:true in electron-builder.yml).
      #   * Windows - WIN_CSC_LINK/WIN_CSC_KEY_PASSWORD (code-signing .pfx,
      #     base64). Mapped onto the CSC_* env that electron-builder reads.
      #
      # DEV builds (channel=dev) are deliberately UNSIGNED: we disable keychain
      # auto-discovery and override `mac.notarize=false` so a credential-less
      # macOS leg cannot fail at the notarization step. This is the path that
      # works today, before any signing identity exists.
      - name: Package installer
        env:
          SIGNED: ${{ needs.mode.outputs.signed }}
          CSC_LINK: ${{ matrix.platform == 'win' && secrets.WIN_CSC_LINK || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'win' && secrets.WIN_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${SIGNED}" = "true" ]; then
            # Only let macOS auto-discover an identity when a cert is actually
            # provided, so a signed build without creds stays graceful.
            if [ "${{ matrix.platform }}" = "mac" ] && [ -z "${CSC_LINK:-}" ]; then
              export CSC_IDENTITY_AUTO_DISCOVERY=false
            fi
            pnpm exec electron-builder --${{ matrix.platform }} --publish never
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            pnpm exec electron-builder --${{ matrix.platform }} --config.mac.notarize=false --publish never
          fi

      # Linux has no OS trust store like Gatekeeper/Authenticode, so we attach a
      # detached GPG signature (when GPG_PRIVATE_KEY is provided) plus a
      # SHA256SUMS manifest. Users verify with `gpg --verify` + `sha256sum -c`.
      - name: Sign + checksum Linux artifacts
        if: matrix.platform == 'linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          SIGNED: ${{ needs.mode.outputs.signed }}
        run: |
          set -euo pipefail
          cd "$(dirname "$(ls release/*/*.AppImage | head -n1)")"
          if [ "${SIGNED}" = "true" ] && [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
            for f in *.AppImage; do
              gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
                --local-user "$KEYID" --detach-sign "$f"
            done
          else
            echo "Unsigned channel or no GPG_PRIVATE_KEY secret; emitting checksums only (UNSIGNED)."
          fi
          sha256sum *.AppImage > SHA256SUMS

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gingermail-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            release/*/*.dmg
            release/*/*.exe
            release/*/*.AppImage
            release/*/*.sig
            release/*/SHA256SUMS
            release/*/*.yml
            release/*/*.blockmap

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    # packages: write -> push to ghcr.io; id-token: write -> cosign keyless
    # (Sigstore) OIDC signing with the Actions-issued token (no key to manage).
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version + image name
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          # ghcr.io repository names must be lowercase.
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}/gingermail' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Browser-accessible convenience image (KasmVNC desktop). We push it to
      # ghcr.io (so it can be cosign-signed by digest) AND export a loadable
      # tarball for direct download from the Release.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless: cosign mints a short-lived cert from the Actions OIDC token and
      # records the signature in the public Rekor transparency log. Verify with:
      #   cosign verify <image>@<digest> \
      #     --certificate-identity-regexp '...' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.meta.outputs.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Export image tarball + checksum + signature
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p docker-dist
          # Pull the pushed tag so `docker load` yields a tagged local image.
          docker pull "${IMAGE}:${VERSION}"
          docker save "${IMAGE}:${VERSION}" \
            | gzip > "docker-dist/gingermail-${VERSION}-docker.tar.gz"
          cd docker-dist
          sha256sum ./*.tar.gz > SHA256SUMS

      # Independently verifiable signature for the downloadable tarball (the
      # registry signature above only covers the pushed image). Verify with:
      #   cosign verify-blob <file> --signature <file>.sig \
      #     --certificate <file>.pem --certificate-identity-regexp '...' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign tarball (cosign blob, keyless)
        run: |
          set -euo pipefail
          cd docker-dist
          f=$(ls ./*.tar.gz)
          cosign sign-blob --yes \
            --output-signature "${f}.sig" \
            --output-certificate "${f}.pem" \
            "$f"

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v7
        with:
          name: gingermail-docker
          if-no-files-found: error
          path: docker-dist/*

  release:
    name: Publish GitHub Release
    needs: [mode, build, docker]
    runs-on: ubuntu-latest
    # Publish on a tag push, or on a manual run where publish_release was ticked.
    if: ${{ startsWith(github.ref, 'refs/tags/') || needs.mode.outputs.publish == 'true' }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # On a tag push this is the pushed tag; on a manual dev publish it is
          # a synthesized `v<version>-dev.<run>` pre-release tag.
          tag_name: ${{ needs.mode.outputs.tag }}
          # Dev builds are unsigned -> always a draft pre-release, clearly named,
          # so an unsigned artifact is never mistaken for a shippable release.
          draft: true
          prerelease: ${{ needs.mode.outputs.channel != 'prod' }}
          name: ${{ needs.mode.outputs.channel == 'prod' && needs.mode.outputs.tag || format('{0} (dev / unsigned)', needs.mode.outputs.tag) }}
          generate_release_notes: true
          files: dist-artifacts/**/*
