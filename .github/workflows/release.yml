name: Release

# Builds installers for macOS, Windows, and Linux natively (one runner per OS)
# and attaches them to a GitHub Release.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1
# or run manually from the Actions tab (workflow_dispatch) to produce build
# artifacts without cutting a Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    env:
      # Builds are UNSIGNED until certificates are provisioned (compliance
      # POA&M PM-008). This disables macOS signing auto-discovery so the build
      # does not fail looking for an identity. Provide CSC_LINK /
      # CSC_KEY_PASSWORD (Windows) and APPLE_* (macOS notarization) secrets and
      # remove this line to enable signing.
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # install runs the postinstall `electron-builder install-app-deps`, which
      # rebuilds native modules (better-sqlite3-multiple-ciphers) for THIS
      # runner's OS/arch.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build app (renderer + main + packages)
        run: pnpm build

      # We skip `prepackage` (the Ollama fetch) on purpose: no verified binary
      # SHAs are pinned yet, and the app falls back to a user-installed Ollama.
      - name: Package installer
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gingermail-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            release/*/*.dmg
            release/*/*.exe
            release/*/*.AppImage
            release/*/*.yml
            release/*/*.blockmap

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: meta
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Browser-accessible convenience image (KasmVNC desktop). This is NOT a
      # registry push: we export the image as a docker-loadable tarball and
      # attach it to the GitHub Release alongside the native installers.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: gingermail:${{ steps.meta.outputs.version }}

      - name: Export image tarball + checksum
        run: |
          set -euo pipefail
          mkdir -p docker-dist
          docker save "gingermail:${{ steps.meta.outputs.version }}" \
            | gzip > "docker-dist/gingermail-${{ steps.meta.outputs.version }}-docker.tar.gz"
          cd docker-dist
          sha256sum ./*.tar.gz > SHA256SUMS

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v7
        with:
          name: gingermail-docker
          if-no-files-found: error
          path: docker-dist/*

  release:
    name: Publish GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: dist-artifacts/**/*
