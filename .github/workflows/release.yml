name: Release

# Builds installers for macOS, Windows, and Linux natively (one runner per OS)
# and attaches them to a GitHub Release.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1
# or run manually from the Actions tab (workflow_dispatch) to produce build
# artifacts without cutting a Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    env:
      # Builds are UNSIGNED until certificates are provisioned (compliance
      # POA&M PM-008). This disables macOS signing auto-discovery so the build
      # does not fail looking for an identity. Provide CSC_LINK /
      # CSC_KEY_PASSWORD (Windows) and APPLE_* (macOS notarization) secrets and
      # remove this line to enable signing.
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # install runs the postinstall `electron-builder install-app-deps`, which
      # rebuilds native modules (better-sqlite3-multiple-ciphers) for THIS
      # runner's OS/arch.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build app (renderer + main + packages)
        run: pnpm build

      # We skip `prepackage` (the Ollama fetch) on purpose: no verified binary
      # SHAs are pinned yet, and the app falls back to a user-installed Ollama.
      - name: Package installer
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gingermail-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            release/*/*.dmg
            release/*/*.exe
            release/*/*.AppImage
            release/*/*.yml
            release/*/*.blockmap

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist-artifacts/**/*
