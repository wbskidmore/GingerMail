name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, typecheck, test, audit, SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Cache the TypeScript project-reference build info so `tsc -b` only
      # recompiles changed packages instead of the whole graph each run.
      - name: Cache TypeScript build info
        uses: actions/cache@v5
        with:
          path: |
            **/*.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # RA-5: fail on high/critical known vulnerabilities in prod deps.
      - name: Dependency audit (prod)
        run: pnpm audit:prod

      # SBOM is generated here (deps already installed) instead of in a separate
      # job, avoiding a second cold `pnpm install`. We generate on PRs too so a
      # broken SBOM toolchain fails the PR rather than only surfacing on the
      # main push; the artifact itself is only uploaded on main.
      - name: Generate SBOM (CycloneDX JSON)
        run: pnpm sbom

      - name: Upload SBOM artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error
